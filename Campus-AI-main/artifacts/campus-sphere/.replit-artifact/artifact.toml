kind = "web"
previewPath = "/"
title = "CampusSphere"
version = "1.0.0"
id = "artifacts/campus-sphere"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23959

[services.development]
run = "pnpm --filter @workspace/campus-sphere run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/campus-sphere", "run", "build" ]
serve = "static"
publicDir = "artifacts/campus-sphere/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23959"
BASE_PATH = "/"
